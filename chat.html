<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>ChatZone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display:flex; 
      flex-direction:column; 
      height:100vh;
    }

    .topbar {
      background: rgba(0,0,0,0.3);
      color: #22c55e;
      padding:15px;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .messages {
      flex:1;
      overflow-y:auto;
      padding:15px;
      display:flex;
      flex-direction:column;
      gap:10px;
      background: #020617;
    }

    .bubble {
      max-width:70%;
      padding:10px;
      border-radius:10px;
      background: #1e293b;
      color: white;
    }

    .self {
      align-self:flex-end;
      background:#22c55e;
      color:black;
    }

    .composer {
      display:flex;
      padding:10px;
      background:#020617;
    }

    input {
      flex:1;
      padding:10px;
      border-radius:20px;
      border:none;
      outline:none;
      background: #1e293b;
      color: white;
    }

    button {
      margin-left:10px;
      padding:10px 15px;
      border:none;
      background:#22c55e;
      color:black;
      border-radius:20px;
      cursor:pointer;
    }

    button:hover {
      background: #16a34a;
    }

.tiny {
  font-size:0.7rem;
  color:#cbd5f5; /* Lichter blauw voor betere leesbaarheid */
  text-align:right;
}

    .author {
      font-size:0.75rem;
      font-weight:bold;
      color:#22c55e;
    }

    #login {
      display:flex;
      justify-content:center;
      align-items:center;
      flex:1;
    }
  </style>
</head>
<body>

<div class="topbar">
  <span>ChatZone</span>
  <button id="logoutBtn" style="display:none;">Logout</button>
</div>

<div id="login">
  <button id="googleLoginBtn">Login met Google</button>
</div>

<div id="chat" style="display:none; flex:1; flex-direction:column;">
  <div id="messages" class="messages"></div>
  <form id="composerForm" class="composer">
    <input id="composerInput" placeholder="Typ een bericht..." autocomplete="off">
    <button type="submit">Verstuur</button>
  </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDiX_do-_xdxn1O1tLzXdxQDK6K3ckvgu8",
  authDomain: "stalkensite.firebaseapp.com",
  projectId: "stalkensite",
  storageBucket: "stalkensite.firebasestorage.app",
  messagingSenderId: "195158731196",
  appId: "1:195158731196:web:a7f85f6412b9bc8c94a3b9",
  measurementId: "G-W9HMETLKG0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const loginDiv = document.getElementById("login");
const chatDiv = document.getElementById("chat");
const googleBtn = document.getElementById("googleLoginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const messagesDiv = document.getElementById("messages");
const composerForm = document.getElementById("composerForm");
const composerInput = document.getElementById("composerInput");

const provider = new GoogleAuthProvider();

googleBtn.addEventListener("click", async () => {
  try { await signInWithPopup(auth, provider); } 
  catch(e) { console.error(e); }
});

logoutBtn.addEventListener("click", () => signOut(auth));

let currentUser = null;

onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    loginDiv.style.display = "none";
    chatDiv.style.display = "flex";
    logoutBtn.style.display = "inline-block";
    listenMessages();
  } else {
    currentUser = null;
    loginDiv.style.display = "flex";
    chatDiv.style.display = "none";
    logoutBtn.style.display = "none";
  }
});

const messagesRef = collection(db, "messages");

async function sendMsg(text) {
  if (!text || !currentUser) return;
  await addDoc(messagesRef, {
    text,
    author: currentUser.displayName,
    created: Date.now()
  });
}

function listenMessages() {
  const q = query(messagesRef, orderBy("created"));

  onSnapshot(q, async snapshot => {
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

    messagesDiv.innerHTML = "";

    for (const docSnap of snapshot.docs) {
      const m = docSnap.data();

      if (m.created < todayStart) {
        await deleteDoc(doc(db, "messages", docSnap.id));
        continue;
      }

      const div = document.createElement("div");
      div.className = "bubble " + (m.author === currentUser.displayName ? "self" : "");
      div.innerHTML = `<div class="author">${m.author}</div><div>${m.text}</div><div class="tiny">${new Date(m.created).toLocaleTimeString()}</div>`;
      messagesDiv.appendChild(div);
    }

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

composerForm.addEventListener("submit", e => {
  e.preventDefault();
  sendMsg(composerInput.value.trim());
  composerInput.value = "";
});

composerInput.addEventListener("keydown", e => {
  if(e.key === "Enter") {
    e.preventDefault();
    composerForm.dispatchEvent(new Event("submit"));
  }
});
</script>
</body>
</html>
