<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PulseChat</title>
  <style>
    :root{--card:rgba(255,250,242,.88);--card-strong:#fffaf3;--text:#1d2430;--muted:#6e7483;--accent:#e85d3f;--accent-2:#ff8c69;--accent-soft:rgba(232,93,63,.15);--green:#1e9e6a;--stroke:rgba(28,35,47,.1);--shadow:0 20px 60px rgba(77,50,29,.18)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;color:var(--text);background:radial-gradient(circle at top left, rgba(232,93,63,.2), transparent 24%),radial-gradient(circle at bottom right, rgba(61,124,255,.14), transparent 22%),linear-gradient(135deg,#f7f1e5 0%,#e8d9c0 100%)}button,input,textarea,select{font:inherit}
    .app-shell{display:grid;grid-template-columns:320px minmax(0,1fr) 320px;min-height:100vh;gap:18px;padding:18px}.panel{background:var(--card);border:1px solid rgba(255,255,255,.45);box-shadow:var(--shadow);backdrop-filter:blur(18px);border-radius:28px;overflow:hidden}.sidebar,.details{display:flex;flex-direction:column;min-height:0}.top-block{padding:22px;border-bottom:1px solid var(--stroke)}
    .brand,.row-line,.section-head,.chat-header,.composer-row,.identity{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand,.chat-header{align-items:flex-start}.chat-header{padding:22px 24px;background:rgba(255,250,242,.75);border-bottom:1px solid var(--stroke)}.brand h1,.chat-header h2,.details h3{margin:0;letter-spacing:-.04em}.mini,.row-sub,.muted{color:var(--muted);font-size:.92rem;line-height:1.5}
    .ghost,.solid,.pill,.icon-button{border:0;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease,background .18s ease}.ghost,.pill,.icon-button{background:transparent;color:var(--text);border:1px solid var(--stroke)}.solid{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 16px 24px rgba(232,93,63,.24)}.ghost:hover,.solid:hover,.pill:hover,.icon-button:hover{transform:translateY(-1px)}.icon-button{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:rgba(255,255,255,.4)}
    .profile-card,.info-card,.form-card,.friend-request{padding:18px;border-radius:22px;background:rgba(255,255,255,.48);border:1px solid var(--stroke);display:grid;gap:12px}.profile-card{margin-top:18px;background:var(--card-strong)}.identity{justify-content:flex-start;gap:14px}.avatar{width:52px;height:52px;border-radius:18px;display:grid;place-items:center;color:#fff;font-weight:800;letter-spacing:-.04em;background:linear-gradient(135deg,#202733,#e85d3f)}
    .status-chip,.small-chip,.pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;font-size:.85rem;font-weight:600}.status-chip{background:rgba(30,158,106,.12);color:var(--green)}.small-chip{background:var(--accent-soft);color:var(--accent)}.pill{background:rgba(255,255,255,.5)}
    .panel-body,.details-body{padding:18px 22px 22px;overflow:auto;display:grid;gap:20px}.section,.stack,.form-grid,.main,.messages,.message{display:grid;gap:12px}.main{grid-template-rows:auto 1fr auto;min-height:0}.row-card{width:100%;text-align:left;padding:14px;border-radius:18px;background:rgba(255,255,255,.45);border:1px solid transparent;display:grid;gap:6px}.row-card.active{border-color:rgba(232,93,63,.35);background:rgba(232,93,63,.12)}
    .messages{padding:24px;overflow:auto;align-content:start;background:linear-gradient(180deg, rgba(255,255,255,.18), transparent 14%),radial-gradient(circle at top right, rgba(61,124,255,.08), transparent 22%)}.message{max-width:min(78%,620px);padding:14px 16px;border-radius:22px;background:#fff;border:1px solid rgba(29,36,48,.06);box-shadow:0 12px 24px rgba(72,49,29,.08)}.message.self{justify-self:end;background:linear-gradient(135deg, rgba(232,93,63,.95), rgba(255,140,105,.95));color:#fff}.message-meta{display:flex;justify-content:space-between;gap:12px;font-size:.8rem;color:var(--muted)}.message.self .message-meta{color:rgba(255,255,255,.8)}
    .composer{padding:18px 24px 24px;border-top:1px solid var(--stroke);background:rgba(255,250,242,.82);display:grid;gap:12px}.composer textarea,.form-grid input,.form-grid select{width:100%;border-radius:18px;border:1px solid var(--stroke);padding:14px 15px;outline:none;background:var(--card-strong);color:var(--text);resize:vertical;min-height:54px}.composer textarea:focus,.form-grid input:focus,.form-grid select:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
    .inline-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.solid,.ghost{padding:12px 16px;border-radius:16px;font-weight:700}.split{display:grid;grid-template-columns:1fr 1fr;gap:10px}.empty{padding:20px;border-radius:22px;border:1px dashed rgba(29,36,48,.18);color:var(--muted);background:rgba(255,255,255,.32);text-align:center}
    @media (max-width:1200px){.app-shell{grid-template-columns:300px minmax(0,1fr)}.details{grid-column:1 / -1}}@media (max-width:860px){.app-shell{grid-template-columns:1fr}.main{min-height:70vh}}@media (max-width:560px){.app-shell{padding:12px;gap:12px}.chat-header,.messages,.composer,.top-block,.panel-body,.details-body{padding-left:16px;padding-right:16px}.split{grid-template-columns:1fr}.message{max-width:92%}}
  </style>
</head>
<body>
  <main class="app-shell" id="app"></main>
  <script>
    const USER_KEY="pulsechat-user",APP_KEY="pulsechat-app-state";
    const defaultSeed={contacts:[{id:"c1",name:"Mila Carter",username:"mila",phone:"+31690001111",status:"Planning tonight's hangout",unread:2,messages:[{id:"m1",sender:"other",author:"Mila Carter",time:"09:12",text:"Hey, can we use PulseChat for our group plan?"},{id:"m2",sender:"self",author:"You",time:"09:13",text:"Yes, I just set it up. Add everyone by phone number or username."},{id:"m3",sender:"other",author:"Mila Carter",time:"09:14",text:"Perfect. I love that it feels like WhatsApp and Discord together."}]},{id:"c2",name:"Noah Reed",username:"noah",phone:"+31690002222",status:"Online",unread:0,messages:[{id:"m4",sender:"other",author:"Noah Reed",time:"Yesterday",text:"Send me the study notes in the server channel later."}]}],friendRequests:[{id:"r1",name:"Sky Ramos",username:"skyr",phone:"+31690003333",status:"Wants to connect"}],servers:[{id:"s1",name:"City Crew",accent:"#3d7cff",channels:[{id:"ch1",name:"general",topic:"Plans, ideas, and updates",messages:[{id:"g1",sender:"other",author:"Mila Carter",time:"08:58",text:"Welcome to the crew server."},{id:"g2",sender:"other",author:"Noah Reed",time:"09:04",text:"Drop any weekend plans here."},{id:"g3",sender:"self",author:"You",time:"09:20",text:"I built this chat layout so we can test all the flows."}]},{id:"ch2",name:"gaming",topic:"Games, voice plans, and clips",messages:[{id:"g4",sender:"other",author:"Sky Ramos",time:"Last night",text:"Who is on tonight?"}]}]},{id:"s2",name:"Study Hub",accent:"#1e9e6a",channels:[{id:"ch3",name:"homework",topic:"Assignments and help",messages:[{id:"g5",sender:"other",author:"Avery Lane",time:"07:40",text:"I uploaded the chapter summary."}]}]}]};
    function getUser(){try{return JSON.parse(localStorage.getItem(USER_KEY)||"null")}catch{return null}}
    const user=getUser(); if(!user){window.location.href="index.html"}
    function loadState(){try{const saved=JSON.parse(localStorage.getItem(APP_KEY)||"null"); if(saved){return {...defaultSeed,...saved,activeView:saved.activeView||null}}}catch{localStorage.removeItem(APP_KEY)} return {...JSON.parse(JSON.stringify(defaultSeed)),activeView:null}}
    let state=loadState(); let activeView=state.activeView||{type:"direct",id:state.contacts[0]?.id||null}; const app=document.getElementById("app");
    const esc=(v)=>v.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); const initials=(n)=>n.split(" ").map((p)=>p[0]).join("").slice(0,2).toUpperCase(); const nowLabel=()=>new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); const makeId=(p)=>`${p}-${Math.random().toString(36).slice(2,9)}`;
    function save(){localStorage.setItem(APP_KEY,JSON.stringify({...state,activeView}))}
    function activeConversation(){if(activeView.type==="server"){for(const server of state.servers){const channel=server.channels.find((item)=>item.id===activeView.channelId); if(channel){return{kind:"server",server,channel,title:`#${channel.name}`,subtitle:channel.topic||`${server.name} channel`,messages:channel.messages}}}} const contact=state.contacts.find((item)=>item.id===activeView.id)||state.contacts[0]; return contact?{kind:"direct",contact,title:contact.name,subtitle:`${contact.phone} · @${contact.username}`,messages:contact.messages}:null}
    function persistAndRender(){save(); render()}
    function setActiveDirect(id){activeView={type:"direct",id}; const contact=state.contacts.find((item)=>item.id===id); if(contact) contact.unread=0; persistAndRender()}
    function setActiveChannel(serverId,channelId){activeView={type:"server",serverId,channelId}; persistAndRender()}
    function render(){const active=activeConversation(); app.innerHTML=`
      <aside class="panel sidebar">
        <div class="top-block">
          <div class="brand"><div><h1>PulseChat</h1><div class="mini">One place for phone-number chats, friend adds, and community channels.</div></div><button class="icon-button" id="resetDemo" title="Reset demo data">↺</button></div>
          <div class="profile-card">
            <div class="identity"><div class="avatar">${initials(user.displayName)}</div><div><strong>${esc(user.displayName)}</strong><div class="mini">@${esc(user.username)} · ${esc(user.phone)}</div></div></div>
            <div class="row-line"><span class="status-chip">● ${esc(user.statusText||"Available now")}</span><button class="ghost" id="editProfile">Edit profile</button></div>
          </div>
        </div>
        <div class="panel-body">
          <section class="section"><div class="section-head"><h2>Direct chats</h2><span class="small-chip">${state.contacts.length} contacts</span></div><div class="stack">
            ${state.contacts.map((c)=>`<button class="row-card ${activeView.type==="direct"&&activeView.id===c.id?"active":""}" data-direct="${c.id}"><div class="row-line"><div><strong>${esc(c.name)}</strong><div class="row-sub">@${esc(c.username)} · ${esc(c.phone)}</div></div>${c.unread?`<span class="small-chip">${c.unread} new</span>`:""}</div><div class="row-sub">${esc(c.messages.at(-1)?.text||c.status)}</div></button>`).join("")}
          </div></section>
          <section class="section"><div class="section-head"><h2>Servers</h2><span class="small-chip">${state.servers.length} spaces</span></div><div class="stack">
            ${state.servers.map((s)=>`<div class="info-card"><div class="row-line"><div><strong>${esc(s.name)}</strong><div class="row-sub">${s.channels.length} channels</div></div><span class="small-chip" style="background:${s.accent}22;color:${s.accent};">Server</span></div><div class="stack">${s.channels.map((ch)=>`<button class="row-card ${activeView.type==="server"&&activeView.channelId===ch.id?"active":""}" data-channel="${s.id}:${ch.id}"><div class="row-line"><strong>#${esc(ch.name)}</strong><span class="row-sub">${ch.messages.length}</span></div><div class="row-sub">${esc(ch.topic)}</div></button>`).join("")}</div></div>`).join("")}
          </div></section>
        </div>
      </aside>
      <section class="panel main">
        <header class="chat-header"><div><h2>${active?esc(active.title):"Choose a chat"}</h2><div class="mini">${active?esc(active.subtitle):"Add someone to start messaging."}</div></div><div class="inline-actions"><button class="pill" id="jumpDirect">Direct message</button><button class="pill" id="jumpServer">Community channel</button><button class="solid" id="createServer">Create server</button></div></header>
        <div class="messages" id="messages">${active&&active.messages.length?active.messages.map((m)=>`<article class="message ${m.sender==="self"?"self":""}"><div>${esc(m.text)}</div><div class="message-meta"><span>${esc(m.author)}</span><span>${esc(m.time)}</span></div></article>`).join(""):`<div class="empty">No messages yet. Say hi and start the conversation.</div>`}</div>
        <form class="composer" id="composerForm"><textarea id="composerInput" placeholder="${active?.kind==="server"?"Message the channel...":"Write a direct message..."}" required></textarea><div class="composer-row"><div class="inline-actions"><span class="pill">${active?.kind==="server"?"Channel mode":"Phone + friend mode"}</span><span class="pill">${active?`${active.messages.length} messages`:"No conversation selected"}</span></div><button class="solid" type="submit">Send message</button></div></form>
      </section>
      <aside class="panel details">
        <div class="top-block"><h3>Connect</h3><div class="mini">Add people with a phone number, send friend requests, and shape your own communities.</div></div>
        <div class="details-body">
          <section class="form-card"><h3>Add by phone or username</h3><div class="muted">This acts like a mix of WhatsApp contact saving and Snapchat adding.</div><form id="contactForm" class="form-grid"><input id="contactName" type="text" placeholder="Name" required><div class="split"><input id="contactUsername" type="text" placeholder="Username" required><input id="contactPhone" type="tel" placeholder="+31..." required></div><input id="contactStatus" type="text" placeholder="Short status or note"><button class="solid" type="submit">Add contact</button></form></section>
          <section class="form-card"><h3>Incoming friend requests</h3><div class="stack">${state.friendRequests.length?state.friendRequests.map((r)=>`<div class="friend-request"><div class="row-line"><div><strong>${esc(r.name)}</strong><div class="row-sub">@${esc(r.username)} · ${esc(r.phone)}</div></div><span class="small-chip">Request</span></div><div class="row-sub">${esc(r.status)}</div><div class="inline-actions"><button class="solid" data-accept="${r.id}">Accept</button><button class="ghost" data-decline="${r.id}">Decline</button></div></div>`).join(""):`<div class="empty">No pending requests right now.</div>`}</div></section>
          <section class="form-card"><h3>Create a Discord-style server</h3><form id="serverForm" class="form-grid"><input id="serverName" type="text" placeholder="Server name" required><div class="split"><input id="channelName" type="text" placeholder="First channel name" required><select id="serverAccent"><option value="#3d7cff">Blue</option><option value="#1e9e6a">Green</option><option value="#e85d3f">Coral</option><option value="#7c4dff">Indigo</option></select></div><input id="channelTopic" type="text" placeholder="Channel topic" required><button class="solid" type="submit">Create server</button></form></section>
        </div>
      </aside>`; bindEvents(); const messages=document.getElementById("messages"); messages.scrollTop=messages.scrollHeight }
    function bindEvents(){document.querySelectorAll("[data-direct]").forEach((b)=>b.addEventListener("click",()=>setActiveDirect(b.dataset.direct))); document.querySelectorAll("[data-channel]").forEach((b)=>b.addEventListener("click",()=>{const [serverId,channelId]=b.dataset.channel.split(":"); setActiveChannel(serverId,channelId)})); document.getElementById("composerForm").addEventListener("submit",handleSendMessage); document.getElementById("contactForm").addEventListener("submit",handleAddContact); document.getElementById("serverForm").addEventListener("submit",handleCreateServer); document.getElementById("createServer").addEventListener("click",()=>document.getElementById("serverName").focus()); document.getElementById("jumpDirect").addEventListener("click",()=>state.contacts[0]&&setActiveDirect(state.contacts[0].id)); document.getElementById("jumpServer").addEventListener("click",()=>state.servers[0]?.channels[0]&&setActiveChannel(state.servers[0].id,state.servers[0].channels[0].id)); document.getElementById("resetDemo").addEventListener("click",()=>{localStorage.removeItem(APP_KEY); state=loadState(); activeView={type:"direct",id:state.contacts[0]?.id||null}; persistAndRender()}); document.getElementById("editProfile").addEventListener("click",()=>window.location.href="index.html"); document.querySelectorAll("[data-accept]").forEach((b)=>b.addEventListener("click",()=>acceptRequest(b.dataset.accept))); document.querySelectorAll("[data-decline]").forEach((b)=>b.addEventListener("click",()=>declineRequest(b.dataset.decline)))}
    function handleSendMessage(event){event.preventDefault(); const textarea=document.getElementById("composerInput"), text=textarea.value.trim(), active=activeConversation(); if(!text||!active) return; const message={id:makeId("msg"),sender:"self",author:user.displayName,time:nowLabel(),text}; if(active.kind==="server") active.channel.messages.push(message); else active.contact.messages.push(message); textarea.value=""; persistAndRender()}
    function handleAddContact(event){event.preventDefault(); const name=document.getElementById("contactName").value.trim(), username=document.getElementById("contactUsername").value.trim().replace(/^@+/,""), phone=document.getElementById("contactPhone").value.trim(), status=document.getElementById("contactStatus").value.trim()||"New contact"; if(!name||!username||!phone) return; const contact={id:makeId("contact"),name,username,phone,status,unread:0,messages:[{id:makeId("hello"),sender:"other",author:name,time:"Just now",text:`Hey ${user.displayName}, glad you added me on PulseChat.`}]}; state.contacts.unshift(contact); activeView={type:"direct",id:contact.id}; event.target.reset(); persistAndRender()}
    function acceptRequest(requestId){const request=state.friendRequests.find((item)=>item.id===requestId); if(!request) return; state.contacts.unshift({id:makeId("contact"),name:request.name,username:request.username,phone:request.phone,status:"New friend",unread:0,messages:[{id:makeId("acc"),sender:"other",author:request.name,time:"Just now",text:"Thanks for accepting my friend request."}]}); state.friendRequests=state.friendRequests.filter((item)=>item.id!==requestId); activeView={type:"direct",id:state.contacts[0].id}; persistAndRender()}
    function declineRequest(requestId){state.friendRequests=state.friendRequests.filter((item)=>item.id!==requestId); persistAndRender()}
    function handleCreateServer(event){event.preventDefault(); const serverName=document.getElementById("serverName").value.trim(), channelName=document.getElementById("channelName").value.trim().replace(/^#+/,""), channelTopic=document.getElementById("channelTopic").value.trim(), accent=document.getElementById("serverAccent").value; if(!serverName||!channelName||!channelTopic) return; const server={id:makeId("server"),name:serverName,accent,channels:[{id:makeId("channel"),name:channelName,topic:channelTopic,messages:[{id:makeId("seed"),sender:"self",author:user.displayName,time:"Just now",text:`Welcome to ${serverName}. Start the conversation in #${channelName}.`}]}]}; state.servers.unshift(server); activeView={type:"server",serverId:server.id,channelId:server.channels[0].id}; event.target.reset(); persistAndRender()}
    render();
  </script>
</body>
</html>
